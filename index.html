<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Star Courier: Rift Arena</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <header class="topbar" aria-label="battle status">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <h1>Star Courier</h1>
            <p>Rift Arena</p>
          </div>
        </div>

        <div class="stats" aria-live="polite">
          <div class="stat fighter-stat">
            <span id="p1Label">P1 疾影</span>
            <strong id="p1Health">120</strong>
            <small id="p1Meta">0 pts</small>
            <div class="meter hp-meter"><i id="p1HpBar"></i></div>
            <div class="meter energy-meter"><i id="p1EnergyBar"></i></div>
          </div>
          <div class="stat timer-stat">
            <span>回合</span>
            <strong id="roundTimer">90</strong>
            <small id="modeLabel">单人对战</small>
          </div>
          <div class="stat fighter-stat">
            <span id="p2Label">AI 堡垒</span>
            <strong id="p2Health">150</strong>
            <small id="p2Meta">0 pts</small>
            <div class="meter hp-meter"><i id="p2HpBar"></i></div>
            <div class="meter energy-meter"><i id="p2EnergyBar"></i></div>
          </div>
        </div>
      </header>

      <section class="stage-wrap" aria-label="Star Courier Rift Arena">
        <canvas id="game" width="960" height="540" tabindex="0"></canvas>

        <div class="overlay is-visible" id="startOverlay">
          <div class="panel lobby-panel">
            <p class="kicker">Rift Arena</p>
            <h2>星航抢晶战</h2>
            <p class="copy level-copy" id="levelIntro">第 1 关：边境训练场</p>

            <div class="lobby-grid">
              <section class="selector-group" aria-labelledby="opponentTitle">
                <h3 id="opponentTitle">对手</h3>
                <div class="segmented">
                  <button class="opponent-option is-selected" data-opponent="ai" type="button">单人 AI</button>
                  <button class="opponent-option" data-opponent="local" type="button">双人同屏</button>
                </div>
              </section>

              <section class="selector-group" aria-labelledby="ruleTitle">
                <h3 id="ruleTitle">玩法</h3>
                <div class="segmented">
                  <button class="rule-option is-selected" data-rule="rush" type="button">抢晶</button>
                  <button class="rule-option" data-rule="blitz" type="button">闪斗</button>
                  <button class="rule-option" data-rule="duel" type="button">决斗</button>
                  <button class="rule-option" data-rule="zone" type="button">占点</button>
                </div>
              </section>

              <section class="selector-group" aria-labelledby="p1Title">
                <h3 id="p1Title">P1 机体</h3>
                <div class="class-grid" id="p1ClassGrid"></div>
              </section>

              <section class="selector-group" aria-labelledby="p2Title">
                <h3 id="p2Title">对手机体</h3>
                <div class="class-grid" id="p2ClassGrid"></div>
              </section>
            </div>

            <button class="primary-action" id="startButton" type="button">开战</button>
          </div>
        </div>

        <div class="overlay" id="pauseOverlay">
          <div class="panel compact">
            <p class="kicker">Paused</p>
            <h2>战斗暂停</h2>
            <div class="action-row">
              <button class="primary-action" id="resumeButton" type="button">继续</button>
              <button class="secondary-action menu-button" type="button">返回大厅</button>
            </div>
          </div>
        </div>

        <div class="overlay" id="gameOverOverlay">
          <div class="panel compact">
            <p class="kicker">Result</p>
            <h2 id="finalScore">P1 获胜</h2>
            <p class="copy" id="finalText">裂隙航线已锁定。</p>
            <div class="action-row">
              <button class="primary-action" id="nextLevelButton" type="button">下一关</button>
              <button class="primary-action" id="restartButton" type="button">再战一局</button>
              <button class="secondary-action menu-button" type="button">返回大厅</button>
            </div>
          </div>
        </div>
      </section>

      <footer class="controls" aria-label="battle controls">
        <div class="keyboard">
          <span class="control-name">P1</span>
          <kbd>WASD</kbd><kbd>Drag</kbd><kbd>Space</kbd><kbd>Shift</kbd>
          <span class="control-name">P2</span>
          <kbd>Arrows</kbd><kbd>Enter</kbd><kbd>/</kbd>
          <kbd>P</kbd>
        </div>

        <div class="touch-pad" aria-label="touch controls">
          <button class="touch-btn" data-action="up" type="button" aria-label="move up">▲</button>
          <button class="touch-btn" data-action="left" type="button" aria-label="move left">◀</button>
          <button class="touch-btn fire" data-action="fire" type="button" aria-label="fire">●</button>
          <button class="touch-btn" data-action="right" type="button" aria-label="move right">▶</button>
          <button class="touch-btn skill" data-action="skill" type="button" aria-label="skill">◆</button>
          <button class="touch-btn" data-action="down" type="button" aria-label="move down">▼</button>
        </div>
      </footer>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
